name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: profundiza_uq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: go.sum
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      # -p 1 serializes package execution. All integration packages share one
      # database and enrollment's TestMain issues `TRUNCATE ... CASCADE`, so
      # running package binaries in parallel would race. Matches `make test-int`.
      - name: Test (unit + integration)
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/profundiza_uq_test?sslmode=disable
        run: go test ./... -count=1 -p 1
      - name: Dependency vulnerability scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || true # report-only for now
